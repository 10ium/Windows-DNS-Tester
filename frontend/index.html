<!DOCTYPE html>
<html lang="fa" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart DNS Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body x-data="dnsTester()" class="min-h-screen transition-colors duration-300 bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100" :dir="lang === 'fa' ? 'rtl' : 'ltr'">

    <header class="border-b border-slate-200 dark:border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                <h1 class="text-xl font-bold tracking-tight" x-text="t[lang].title"></h1>
            </div>
            <div class="flex gap-2">
                <button @click="toggleLang()" class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm font-medium" x-text="lang === 'fa' ? 'English' : 'فارسی'"></button>
                <button @click="toggleTheme()" class="p-2 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">
                    <template x-if="dark">
                        <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    </template>
                    <template x-if="!dark">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </template>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-4">
            <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700/50">
                <label class="block text-sm font-bold mb-2" x-text="t[lang].dnsListLabel"></label>
                <textarea x-model="dnsList" class="w-full h-40 p-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-xs"></textarea>

                <div class="mt-4">
                    <label class="block text-xs font-semibold mb-2" x-text="t[lang].fallbackLabel"></label>
                    <div class="grid grid-cols-3 gap-2">
                        <template x-for="option in ['UDP', 'TCP', 'Both']">
                            <button @click="fallbackProtocol = option" :class="fallbackProtocol === option ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700/40'" class="py-1.5 text-xs font-bold rounded-lg border transition-all" x-text="option === 'Both' ? (lang === 'fa' ? 'هر دو' : 'Both') : option"></button>
                        </template>
                    </div>
                </div>

                <button @click="showAdvanced = !showAdvanced" class="w-full mt-4 text-xs font-semibold text-indigo-500 hover:text-indigo-400 flex items-center justify-center gap-1">
                    <span x-text="t[lang].settings"></span>
                    <span x-text="showAdvanced ? '▲' : '▼'"></span>
                </button>

                <div x-show="showAdvanced" x-transition class="mt-4 space-y-3 pt-3 border-t border-slate-200 dark:border-slate-700/50">
                    <!-- قابلیت جدید: ورودی دی‌ان‌اس‌های راه انداز قابل شخصی‌سازی توسط کاربر -->
                    <div>
                        <label class="block text-xs font-bold mb-1 text-indigo-500" x-text="t[lang].bootstrapLabel"></label>
                        <input type="text" x-model="bootstrapDNS" class="w-full p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono focus:ring-1 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-indigo-500" x-text="t[lang].editDomainsLabel"></label>
                        <textarea x-model="targetDomainsRaw" class="w-full h-24 p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono focus:ring-1 focus:ring-indigo-500 focus:outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1" x-text="t[lang].concurrency"></label>
                        <input type="number" x-model.number="concurrency" class="w-full p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1" x-text="t[lang].timeout"></label>
                        <input type="number" x-model.number="timeoutMS" class="w-full p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1" x-text="t[lang].pingCount"></label>
                        <input type="number" x-model.number="pingCount" class="w-full p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1" x-text="t[lang].downloadSize"></label>
                        <input type="number" x-model.number="downloadMB" class="w-full p-2 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 font-mono">
                    </div>
                </div>

                <button @click="startTesting()" :disabled="isTesting" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 disabled:bg-slate-600 transition flex items-center justify-center gap-2">
                    <template x-if="isTesting">
                        <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
                    </template>
                    <span x-text="isTesting ? t[lang].testing : t[lang].runTests"></span>
                </button>
            </div>
        </div>

        <div class="md:col-span-2 space-y-4">
            <template x-if="results.length === 0">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl text-center border border-slate-200 dark:border-slate-700/50">
                    <svg class="w-16 h-16 text-slate-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.656 48.656 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7C4.547 9.547 4.5 10.768 4.5 12s.047 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.092-1.209.138-2.43.138-3.662z"/></svg>
                    <p class="text-slate-400 text-sm" x-text="t[lang].noResults"></p>
                </div>
            </template>

            <template x-for="res in results">
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-md border border-slate-200 dark:border-slate-700/50 hover:border-indigo-500 transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400" x-text="res.protocol"></span>
                            <span class="font-bold font-mono text-sm md:text-base" x-text="res.ip"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400" x-text="t[lang].score"></span>
                            <span class="text-xl font-black text-indigo-500" x-text="res.score"></span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-xs md:text-sm border-t border-slate-100 dark:border-slate-700/40 pt-3 mb-4">
                        <div>
                            <span class="text-slate-400" x-text="t[lang].latency + ': '"></span>
                            <strong class="font-mono text-emerald-500" x-text="res.avg_latency_ms === 9999 ? t[lang].Failed : res.avg_latency_ms.toFixed(1) + ' ms'"></strong>
                        </div>
                        <div>
                            <span class="text-slate-400" x-text="t[lang].speed + ': '"></span>
                            <strong class="font-mono text-amber-500" x-text="res.download_speed_mbps.toFixed(2) + ' Mbps'"></strong>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 pt-2 border-t border-slate-100 dark:border-slate-700/30">
                        <template x-for="site in res.site_results">
                            <div class="p-2 rounded-lg bg-slate-50 dark:bg-slate-900/60 flex flex-col justify-between text-[11px]">
                                <span class="font-medium text-slate-500 dark:text-slate-400 truncate" x-text="site.domain"></span>
                                <span class="font-bold mt-1" :class="site.status === 'Safe' ? 'text-emerald-500' : (site.status === 'Poisoned' ? 'text-rose-500' : 'text-slate-400')" x-text="t[lang][site.status]"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <footer class="text-xs text-slate-400 text-center py-6 border-t border-slate-200 dark:border-slate-800 mt-8">
        Smart DNS Tester - Version <span x-text="version"></span>
    </footer>

    <script>
        function dnsTester() {
            return {
                lang: 'fa',
                dark: true,
                fallbackProtocol: 'Both',
                dnsList: '1.1.1.2\ntcp://1.1.1.3\nudp://1.1.1.1\nhttps://dns.google/dns-query\nhttps://cloudflare-dns.com/dns-query',
                concurrency: 10,
                timeoutMS: 2000,
                pingCount: 5,
                downloadMB: 2,
                showAdvanced: false,
                isTesting: false,
                version: '1.0.0',
                results: [],
                
                // مقدار اولیه دی‌ان‌اس‌های راه انداز
                bootstrapDNS: '1.1.1.1, 8.8.8.8',

                targetDomainsRaw: 'chatgpt.com\ngemini.google.com\nclaude.ai\ngrok.com\nx.com\ntwitter.com\nstore.steampowered.com\nsteamcommunity.com\nepicgames.com\ngithub.com\nyoutube.com',

                t: {
                    fa: {
                        title: "تست‌کننده هوشمند دی‌ان‌اس",
                        dnsListLabel: "لیست سرورهای DNS (هر کدام در یک خط):",
                        fallbackLabel: "پروتکل دی‌ان‌اس‌های معمولی (بدون پیشوند):",
                        runTests: "شروع عیب‌یابی و آزمایش",
                        testing: "در حال بررسی شبکه...",
                        score: "امتیاز هوشمند",
                        latency: "میانگین تاخیر",
                        speed: "سرعت دانلود استیم",
                        settings: "تنظیمات پیشرفته ترافیک",
                        bootstrapLabel: "دی‌ان‌اس‌های راه انداز (با ویرگول جدا کنید):",
                        editDomainsLabel: "لیست دامنه‌های تست (قابل ویرایش):",
                        concurrency: "تعداد تست همزمان (Thread):",
                        timeout: "مهلت اتصال (میلی‌ثانیه):",
                        pingCount: "تعداد تکرار بررسی پینگ:",
                        downloadSize: "حجم دانلود فایل تست (مگابایت):",
                        Safe: "ایمن و باز",
                        Poisoned: "مسموم/فیلتر شده",
                        Failed: "قطع اتصال",
                        noResults: "هیچ تستی انجام نشده است. ابتدا آدرس‌های دی‌ان‌اس را وارد کنید و دکمه شروع را بزنید."
                    },
                    en: {
                        title: "Smart DNS Tester",
                        dnsListLabel: "DNS Server List (One per line):",
                        fallbackLabel: "Protocol for plain IPs (without prefix):",
                        runTests: "Run Network Diagnostics",
                        testing: "Diagnosing...",
                        score: "Smart Score",
                        latency: "Avg Latency",
                        speed: "Steam Download Speed",
                        settings: "Advanced Test Parameters",
                        bootstrapLabel: "Bootstrap DNS (comma-separated):",
                        editDomainsLabel: "Target Test Domains (Editable):",
                        concurrency: "Concurrency Limit:",
                        timeout: "Timeout limit (ms):",
                        pingCount: "Ping Repeat count:",
                        downloadSize: "Download test size (MB):",
                        Safe: "Open & Safe",
                        Poisoned: "Blocked/Poisoned",
                        Failed: "Connection Failed",
                        noResults: "No tests run yet. Insert DNS addresses and click Run."
                    }
                },

                init() {
                    if (window.go && window.go.main && window.go.main.App) {
                        window.go.main.App.GetVersion().then(v => this.version = v);
                    }
                },

                toggleLang() {
                    this.lang = this.lang === 'fa' ? 'en' : 'fa';
                },

                toggleTheme() {
                    this.dark = !this.dark;
                    if (this.dark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                },

                async startTesting() {
                    if (this.isTesting) return;
                    this.isTesting = true;
                    this.results = [];

                    const domainsArray = this.targetDomainsRaw.split('\n')
                        .map(d => d.trim())
                        .filter(d => d !== "");

                    const requestPayload = {
                        dns_list: this.dnsList,
                        fallback_protocol: this.fallbackProtocol,
                        concurrency: this.concurrency,
                        timeout_ms: this.timeoutMS,
                        ping_count: this.pingCount,
                        download_mb: this.downloadMB,
                        target_domains: domainsArray,
                        bootstrap_dns: this.bootstrapDNS // ارسال لیست به بک‌اند
                    };

                    try {
                        if (window.go && window.go.main && window.go.main.App) {
                            let res = await window.go.main.App.RunDNSTests(requestPayload);
                            res.sort((a, b) => b.score - a.score);
                            this.results = res;
                        } else {
                            this.results = [
                                {
                                    protocol: 'DoH', ip: 'https://cloudflare-dns.com', avg_latency_ms: 22.4, jitter_ms: 1.2, download_speed_mbps: 92.5, score: 98,
                                    site_results: [
                                        { domain: 'chatgpt.com', status: 'Safe' },
                                        { domain: 'x.com', status: 'Safe' },
                                        { domain: 'youtube.com', status: 'Safe' },
                                        { domain: 'epicgames.com', status: 'Safe' }
                                    ]
                                }
                            ];
                        }
                    } catch (e) {
                        console.error("Test execution failed:", e);
                    } finally {
                        this.isTesting = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
